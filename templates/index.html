<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaego AI</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; height: 100vh; display: flex; flex-direction: column; color: #e0e0e0; }
    .header { padding: 4px 16px; display: flex; align-items: center; gap: 8px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; height: 56px; }
.header img { height: 48px; width: 48px; object-fit: contain; object-position: center; }
.header img { height: 45px; width: auto; }
    .header-subtitle { font-size: 13px; color: #888; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; max-width: 800px; width: 100%; margin: 0 auto; }
    .message { display: flex; gap: 12px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
    .avatar.kaego { background: linear-gradient(135deg, #1a6bff, #00c6ff); color: white; }
    .avatar.user { background: #2a2a2a; color: #aaa; font-size: 18px; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-wrap: break-word; overflow-wrap: anywhere; }
    .bubble.user { background: #1a6bff; color: white; border-bottom-right-radius: 4px; }
    .bubble.kaego { background: #1e1e1e; color: #e0e0e0; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }
    .bubble p { margin: 3px 0; font-size: 15px; }
    .input-area { padding: 16px 24px; background: #1a1a1a; border-top: 1px solid #2a2a2a; }
    .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: #2a2a2a; border-radius: 24px; padding: 10px 16px; border: 1.5px solid #333; transition: border 0.2s; }
    .input-box:focus-within { border-color: #1a6bff; }
    .input-box textarea { flex: 1; border: none; background: transparent; outline: none; font-size: 15px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; color: #e0e0e0; }
    .input-box textarea::placeholder { color: #555; }
    .send-btn { background: #1a6bff; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    .send-btn:hover { background: #0055dd; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .typing { color: #555; font-size: 14px; font-style: italic; padding: 4px 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="/static/logo.png" alt="Kaego Logo">
        <span class="header-subtitle">AI Assistant</span>
    </div>

    <div class="chat-messages" id="messages">
        <div class="message">
            <div class="avatar kaego">K</div>
            <div class="bubble kaego">
                <p>Halo Kak! 👋 Aku Kaego, asisten AI kamu.</p>
                <p>Ada yang bisa aku bantu nih? 😊</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="input" placeholder="Tanya Kaego apa saja..." rows="1"></textarea>
            <button class="send-btn" id="btnKirim">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
                </svg>
            </button>
