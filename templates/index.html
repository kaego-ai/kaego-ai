<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta name="apple-mobile-web-app-title" content="Kaego AI">
    <meta name="theme-color" content="#0f0f0f">
    <title>Kaego AI</title>
    <meta name="theme-color" content="#0f0f0f">
<title>Kaego AI</title>
<link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; display: flex; flex-direction: column; color: #e0e0e0; overflow: hidden; }

    /* ===== SIDEBAR ===== */
    .sidebar { position: fixed; top: 0; left: 0; height: 100%; width: 280px; background: #111; border-right: 1px solid #222; z-index: 1002; transform: translateX(-100%); transition: transform 0.3s ease; display: flex; flex-direction: column; }
    .sidebar.open { transform: translateX(0); }
    .sidebar-header { padding: 16px 16px 12px; border-bottom: 1px solid #222; display: flex; align-items: center; gap: 10px; }
    .sidebar-back { background: transparent; border: none; cursor: pointer; color: #888; display: flex; align-items: center; padding: 4px; border-radius: 8px; transition: color 0.2s; flex-shrink: 0; }
    .sidebar-back:hover { color: #fff; }
    .sidebar-back svg { width: 20px; height: 20px; }
    .sidebar-body { flex: 1; overflow-y: auto; padding: 8px; }
    .riwayat-toggle { width: 100%; display: flex; align-items: center; justify-content: space-between; padding: 10px 12px; background: #1a1a1a; border: none; border-radius: 10px; color: #ccc; font-size: 13px; cursor: pointer; font-family: inherit; transition: background 0.2s; margin-bottom: 4px; }
    .riwayat-toggle:hover { background: #222; color: #fff; }
    .riwayat-toggle svg { transition: transform 0.2s; }
    .riwayat-toggle.open svg.chevron { transform: rotate(180deg); }
    .sidebar-list { display: none; flex-direction: column; gap: 4px; padding: 4px 0; }
    .sidebar-list.open { display: flex; }
    .sidebar-item { padding: 10px 12px; border-radius: 10px; cursor: pointer; font-size: 13px; color: #aaa; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; transition: background 0.2s, color 0.2s; }
    .sidebar-item:hover { background: #1a1a1a; color: #fff; }
    .sidebar-item.active { background: #1a2a3a; color: #4a9eff; }
    .sidebar-empty { font-size: 13px; color: #555; text-align: center; padding: 16px 0; }
    .sidebar-footer { padding: 12px 8px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-footer-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; font-size: 13px; color: #888; cursor: pointer; background: transparent; border: none; font-family: inherit; transition: background 0.2s, color 0.2s; width: 100%; text-align: left; text-decoration: none; }
    .sidebar-footer-item:hover { background: #1a1a1a; color: #fff; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1001; display: none; pointer-events: none; }
    .sidebar-overlay.show { display: block; }

    /* ===== MODAL PROFIL ===== */
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal-overlay.show { display: flex; }
    .modal { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 28px; width: 90%; max-width: 400px; }
    .modal-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
    .modal-title { font-size: 17px; font-weight: 600; color: #fff; }
    .modal-close { background: transparent; border: none; cursor: pointer; color: #666; font-size: 20px; line-height: 1; transition: color 0.2s; }
    .modal-close:hover { color: #fff; }
    .profil-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 20px; border: 2px solid #333; background: #2a2a2a; }
    .profil-avatar-placeholder { width: 80px; height: 80px; border-radius: 50%; background: #2a2a2a; border: 2px solid #333; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
    .modal-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .modal-value { font-size: 14px; color: #ccc; background: #111; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
    .modal-input { width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 16px; }
    .modal-input:focus { border-color: #1a6bff; }
    .modal-select { width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 20px; cursor: pointer; }
    .modal-select:focus { border-color: #1a6bff; }
    .modal-btn { width: 100%; padding: 12px; background: #1a6bff; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-family: inherit; transition: background 0.2s; }
    .modal-btn:hover { background: #0055dd; }

    /* ===== HEADER ===== */
    .header { padding: 8px 20px; display: flex; align-items: center; gap: 8px; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; position: sticky; top: 0; z-index: 100; }
    .header img.logo { height: 40px; width: auto; max-width: 150px; }
    .menu-btn { background: transparent; border: none; cursor: pointer; color: #888; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 8px; transition: color 0.2s; flex-shrink: 0; }
    .menu-btn:hover { color: #fff; }
    .menu-btn svg { width: 22px; height: 22px; }

    /* ===== CHAT ===== */
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; max-width: 800px; width: 100%; margin: 0 auto; }
    .message { display: flex; gap: 12px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
    .avatar.kaego { background: transparent; }
    .avatar.kaego img { width: 36px; height: 36px; border-radius: 50%; object-fit: contain; }
    .avatar.user { background: #2a2a2a; color: #aaa; font-size: 18px; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-wrap: break-word; overflow-wrap: anywhere; }
    .bubble.user { background: #1a6bff; color: white; border-bottom-right-radius: 4px; }
    .bubble.kaego { background: #1e1e1e; color: #e0e0e0; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }
    .bubble p { margin: 3px 0; font-size: 15px; }

    /* ===== INPUT ===== */
    .input-area { padding: 16px 24px; background: #0f0f0f; border-top: 1px solid #1a1a1a; position: sticky; bottom: 0; z-index: 100; }
    .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: center; background: #1e1e1e; border-radius: 24px; padding: 10px 16px; border: 1.5px solid #333; transition: border 0.2s; flex-wrap: wrap; }
    .input-box:focus-within { border-color: #1a6bff; }
    .input-box textarea { flex: 1; border: none; background: transparent; outline: none; font-size: 15px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; color: #e0e0e0; min-width: 0; padding-top: 0; align-self: center; }
    .input-box textarea::placeholder { color: #555; }
    .upload-btn { background: transparent; border: none; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #666; transition: color 0.2s; }
    .upload-btn:hover { color: #1a6bff; }
    .upload-btn svg { width: 20px; height: 20px; }
    .send-btn { background: transparent; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; padding: 0; }
    .send-btn::before { content: ''; position: absolute; inset: 0; border-radius: 50%; padding: 3px; background: conic-gradient(from 0deg, #f97316, #14b8a6, #3b82f6, #f97316); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
    .send-btn svg { display: none; }
    .send-btn:hover::before { opacity: 0.8; }
    .send-btn.loading::before { animation: spin 0.8s linear infinite; }
    .send-btn:not(.loading)::after { content: ''; position: absolute; width: 10px; height: 10px; border-right: 2.5px solid #14b8a6; border-top: 2.5px solid #14b8a6; border-radius: 1px; transform: rotate(45deg) translate(-1px, 1px); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .welcome-send-btn { background: transparent; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; padding: 0; }
    .welcome-send-btn::before { content: ''; position: absolute; inset: 0; border-radius: 50%; padding: 3px; background: conic-gradient(from 0deg, #f97316, #14b8a6, #3b82f6, #f97316); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
    .welcome-send-btn svg { display: none; }
    .welcome-send-btn::after { content: ''; position: absolute; width: 10px; height: 10px; border-right: 2.5px solid #14b8a6; border-top: 2.5px solid #14b8a6; border-radius: 1px; transform: rotate(45deg) translate(-1px, 1px); }
    .welcome-send-btn:hover::before { opacity: 0.8; }
    .file-preview { width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 4px 0 4px; border-top: 1px solid #2a2a2a; margin-top: 4px; }
    .file-preview-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid #333; background: #2a2a2a; flex-shrink: 0; }
    .file-preview-pdf { width: 48px; height: 48px; border-radius: 8px; background: #2a1a1a; border: 1px solid #4a2a2a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
    .file-preview-info { flex: 1; min-width: 0; }
    .file-preview-name { font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-preview-size { font-size: 11px; color: #666; margin-top: 2px; }
    .file-preview-remove { background: transparent; border: none; cursor: pointer; color: #666; font-size: 18px; line-height: 1; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
    .file-preview-remove:hover { color: #ff4444; }
    .bubble img.chat-img { max-width: 100%; border-radius: 10px; display: block; margin-bottom: 8px; border: 1px solid #333; }
    .bubble .file-label { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    .typing { color: #555; font-size: 14px; font-style: italic; padding: 4px 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f0f; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }

    /* ===== HALAMAN SAMBUTAN ===== */
    .welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s ease; pointer-events: all; }
    .welcome-screen.hidden { opacity: 0; pointer-events: none; }
    .welcome-top { position: absolute; top: 16px; left: 16px; z-index: 1001; pointer-events: all; }
    .welcome-logo { height: 56px; width: auto; max-width: 200px; margin-bottom: 28px; }
    .welcome-greeting { font-size: 13px; color: #888; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
    .welcome-name { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 40px; text-align: center; }
    .welcome-input-box { width: 90%; max-width: 500px; display: flex; gap: 10px; align-items: center; background: #1e1e1e; border-radius: 24px; padding: 12px 18px; border: 1.5px solid #333; transition: border 0.2s; }
    .welcome-input-box:focus-within { border-color: #1a6bff; }
    .welcome-input-box textarea { flex: 1; border: none; background: transparent; outline: none; font-size: 15px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; color: #e0e0e0; align-self: center; }
    .welcome-input-box textarea::placeholder { color: #555; }
    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: #eee; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; }
    .toast.show { opacity: 1; }
    </style>
</head>
<body>

    <div class="toast" id="toast"></div>
    <input type="file" id="fileInput" accept="image/*,.pdf" style="display:none">
    <input type="file" id="fotoProfilInput" accept="image/*" style="display:none">

    <!-- Modal Profil -->
    <div class="modal-overlay" id="modalProfil">
        <div class="modal">
            <div class="modal-header">
                <span class="modal-title">Profil Saya</span>
                <button class="modal-close" id="tutupProfil">✕</button>
            </div>
            <div id="profilAvatarWrap">
                <div class="profil-avatar-placeholder" id="profilAvatarPlaceholder">👤</div>
            </div>
            <div style="text-align:center;margin-bottom:16px;">
                <button onclick="document.getElementById('fotoProfilInput').click()" style="background:transparent;border:1px solid #333;color:#888;font-size:12px;padding:5px 12px;border-radius:8px;cursor:pointer;font-family:inherit;">Ganti Foto</button>
            </div>
            <div class="modal-label">Email</div>
            <div class="modal-value" id="profilEmail">-</div>
            <div class="modal-label">Nama</div>
            <input class="modal-input" id="profilNama" type="text" placeholder="Nama kamu">
            <div class="modal-label">Gaya Font</div>
            <select class="modal-select" id="profilFont">
                <option value="default">Default (Segoe UI)</option>
                <option value="serif">Serif (Georgia)</option>
                <option value="mono">Monospace (Courier)</option>
                <option value="rounded">Rounded (Varela Round)</option>
            </select>
            <button class="modal-btn" id="simpanProfil">Simpan</button>
        </div>
    </div>

    <!-- Sidebar overlay -->
    <div class="sidebar-overlay" id="sidebarOverlay"></div>

    <!-- Sidebar -->
    <div class="sidebar" id="sidebar">
        <div class="sidebar-header">
            <button class="sidebar-back" id="backBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M15 18l-6-6 6-6"/>
                </svg>
            </button>
            <img src="/static/logo.png" style="height:32px;width:auto;max-width:140px;">
        </div>
        <div class="sidebar-body">
            <button class="riwayat-toggle" id="toggleRiwayat">
                <span style="display:flex;align-items:center;gap:8px;">
                    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                    Riwayat Obrolan
                </span>
                <svg class="chevron" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="6 9 12 15 18 9"/></svg>
            </button>
            <div class="sidebar-list" id="sidebarList">
                <div class="sidebar-empty">Belum ada obrolan</div>
            </div>
        </div>
        <div class="sidebar-footer">
            <button class="sidebar-footer-item" id="btnProfil">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
                <span id="namaUserSidebar"></span>
            </button>
            <button class="sidebar-footer-item" id="sidebarNewBtn">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" width="16" height="16"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                Obrolan Baru
            </button>
            <a href="/logout" class="sidebar-footer-item" style="color:#ff5555;">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" width="16" height="16"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Keluar
            </a>
        </div>
    </div>

    <!-- Halaman Sambutan -->
    <div class="welcome-screen" id="welcomeScreen">
        <div class="welcome-top">
            <button class="menu-btn" id="menuBtnWelcome">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                    <line x1="3" y1="6" x2="21" y2="6"/>
                    <line x1="3" y1="12" x2="21" y2="12"/>
                    <line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
        </div>
        <img src="/static/avatar.gif" class="welcome-logo" alt="Kaego">
        <div class="welcome-greeting" id="welcomeGreeting">Selamat pagi</div>
        <div class="welcome-name" id="welcomeName">nama</div>
        <div class="welcome-input-box">
            <textarea id="welcomeInput" placeholder="Tanya Kaego apa saja..." rows="1"></textarea>
            <button class="welcome-send-btn" id="welcomeSendBtn"></button>
        </div>
    </div>

    <!-- Header -->
    <div class="header">
        <button class="menu-btn" id="menuBtn">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
                <line x1="3" y1="6" x2="21" y2="6"/>
                <line x1="3" y1="12" x2="21" y2="12"/>
                <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
        </button>
        <img src="/static/logo.png" alt="Kaego Logo" class="logo">
    </div>

    <div class="chat-messages" id="messages"></div>

    <div class="input-area">
        <div class="input-box" id="inputBox">
            <div class="file-preview" id="filePreview" style="display:none;">
                <div id="previewThumb"></div>
                <div class="file-preview-info">
                    <div class="file-preview-name" id="previewName"></div>
                    <div class="file-preview-size" id="previewSize"></div>
                </div>
                <button class="file-preview-remove" id="removeFile">✕</button>
            </div>
            <textarea id="input" placeholder="Tanya Kaego apa saja..." rows="1"></textarea>
            <button class="upload-btn" id="uploadBtn" title="Upload foto atau PDF">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21.44 11.05l-9.19 9.19a6 6 0 0 1-8.49-8.49l9.19-9.19a4 4 0 0 1 5.66 5.66L9.42 16.41a2 2 0 0 1-2.83-2.83l8.49-8.48"/>
                </svg>
            </button>
            <button class="send-btn" id="btnKirim"></button>
        </div>
    </div>

    <script>
        function setHeight() { document.body.style.height = window.innerHeight + 'px'; }
        setHeight();
        window.addEventListener('resize', setHeight);

        function getSapaan() {
            var jam = new Date().getHours();
            if (jam >= 5 && jam < 11) return "Selamat pagi ☀️";
            if (jam >= 11 && jam < 15) return "Selamat siang 🌤️";
            if (jam >= 15 && jam < 18) return "Selamat sore 🌅";
            return "Selamat malam 🌙";
        }

        var namaUser = "{{ nama }}";
        document.getElementById("welcomeGreeting").textContent = getSapaan();
        document.getElementById("welcomeName").textContent = namaUser;
        document.getElementById("namaUserSidebar").textContent = namaUser;

        // ===== SIDEBAR =====
        var sidebar = document.getElementById("sidebar");
        var overlay = document.getElementById("sidebarOverlay");
        sidebar.classList.remove("open");
        overlay.classList.remove("show");

        function bukaSidebar() {
            sidebar.classList.add("open");
            overlay.classList.add("show");
            overlay.style.pointerEvents = "all";
            muatDaftarObrolan();
        }

        function tutupSidebar() {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
            overlay.style.pointerEvents = "none";
        }

        document.getElementById("menuBtn").addEventListener("click", bukaSidebar);
        document.getElementById("menuBtnWelcome").addEventListener("click", bukaSidebar);
        document.getElementById("backBtn").addEventListener("click", tutupSidebar);
        overlay.addEventListener("click", tutupSidebar);

        document.getElementById("toggleRiwayat").addEventListener("click", function() {
            var list = document.getElementById("sidebarList");
            var btn = document.getElementById("toggleRiwayat");
            list.classList.toggle("open");
            btn.classList.toggle("open");
        });

        document.getElementById("sidebarNewBtn").addEventListener("click", function() {
            mulaiObrolanBaru();
            tutupSidebar();
        });

        // ===== PROFIL =====
        document.getElementById("btnProfil").addEventListener("click", function() {
            bukaProfil();
            tutupSidebar();
        });

        document.getElementById("tutupProfil").addEventListener("click", function() {
            document.getElementById("modalProfil").classList.remove("show");
        });

        document.getElementById("modalProfil").addEventListener("click", function(e) {
            if (e.target === this) this.classList.remove("show");
        });

        function bukaProfil() {
            fetch("/profil")
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.profil) {
                    var p = data.profil;
                    document.getElementById("profilEmail").textContent = p.email || "-";
                    document.getElementById("profilNama").value = p.nama || "";
                    document.getElementById("profilFont").value = p.gaya_font || "default";

                    var wrap = document.getElementById("profilAvatarWrap");
                    if (p.foto_profil) {
                        wrap.innerHTML = '<img class="profil-avatar" src="' + p.foto_profil + '" alt="Foto Profil">';
                    } else {
                        // Coba ambil dari Gravatar pakai email
                        var emailHash = p.email ? p.email.trim().toLowerCase() : "";
                        var gravatarUrl = "https://www.gravatar.com/avatar/" + md5(emailHash) + "?d=404&s=80";
                        var img = new Image();
                        img.onload = function() {
                            wrap.innerHTML = '<img class="profil-avatar" src="' + gravatarUrl + '" alt="Foto Profil">';
                        };
                        img.onerror = function() {
                            wrap.innerHTML = '<div class="profil-avatar-placeholder">👤</div>';
                        };
                        img.src = gravatarUrl;
                    }
                }
            });
            document.getElementById("modalProfil").classList.add("show");
        }

        // Ganti foto profil
        document.getElementById("fotoProfilInput").addEventListener("change", function(e) {
            var file = e.target.files[0];
            if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                var base64 = ev.target.result;
                document.getElementById("profilAvatarWrap").innerHTML = '<img class="profil-avatar" src="' + base64 + '">';
                // Simpan ke server
                fetch("/profil/update", {
                    method: "POST",
                    headers: {"Content-Type": "application/json"},
                    body: JSON.stringify({foto_profil: base64})
                });
            };
            reader.readAsDataURL(file);
        });

        // Simpan profil
        document.getElementById("simpanProfil").addEventListener("click", function() {
            var nama = document.getElementById("profilNama").value.trim();
            var font = document.getElementById("profilFont").value;
            if (!nama) { showToast("Nama tidak boleh kosong!"); return; }

            fetch("/profil/update", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({nama: nama, gaya_font: font})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    // Update font
                    var fontMap = {
                        "default": "'Segoe UI', Arial, sans-serif",
                        "serif": "Georgia, serif",
                        "mono": "'Courier New', monospace",
                        "rounded": "'Varela Round', sans-serif"
                    };
                    document.body.style.fontFamily = fontMap[font] || fontMap["default"];
                    // Update nama
                    namaUser = nama;
                    document.getElementById("welcomeName").textContent = nama;
                    document.getElementById("namaUserSidebar").textContent = nama;
                    document.getElementById("modalProfil").classList.remove("show");
                    showToast("Profil berhasil disimpan!");
                }
            });
        });

        function muatDaftarObrolan() {
            fetch("/daftar_obrolan")
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var list = document.getElementById("sidebarList");
                list.innerHTML = "";
                if (!data.obrolan || data.obrolan.length === 0) {
                    list.innerHTML = '<div class="sidebar-empty">Belum ada obrolan</div>';
                    return;
                }
                data.obrolan.forEach(function(item) {
                    var div = document.createElement("div");
                    div.className = "sidebar-item";
                    div.textContent = item.judul || "Obrolan";
                    div.addEventListener("click", function() { bukaObrolan(item.id, item.judul); });
                    list.appendChild(div);
                });
            });
        }

        function bukaObrolan(id, judul) {
            fetch("/buka_obrolan/" + id)
            .then(function(res) { return res.json(); })
            .then(function(data) {
                var messages = document.getElementById("messages");
                messages.innerHTML = "";
                if (data.riwayat) {
                    data.riwayat.forEach(function(item) {
                        tampilPesan(item.pesan, "user");
                        tampilPesan(item.jawaban, "kaego");
                    });
                    messages.scrollTop = messages.scrollHeight;
                }
                tutupSidebar();
                sembunyikanWelcome();
                showToast("Membuka: " + (judul || "Obrolan"));
            });
        }

        function mulaiObrolanBaru() {
            fetch("/reset", { method: "POST" })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    document.getElementById("messages").innerHTML = "";
                    showToast("Obrolan baru dimulai!");
                }
            });
        }

        fetch("/riwayat")
        .then(function(res) { return res.json(); })
        .then(function(data) {
            if (data.riwayat && data.riwayat.length > 0) {
                data.riwayat.forEach(function(item) {
                    tampilPesan(item.pesan, "user");
                    tampilPesan(item.jawaban, "kaego");
                });
                document.getElementById("messages").scrollTop = document.getElementById("messages").scrollHeight;
            }
        });

        var selectedFile = null;

        document.getElementById("uploadBtn").addEventListener("click", function() { document.getElementById("fileInput").click(); });

        document.getElementById("fileInput").addEventListener("change", function(e) {
            var file = e.target.files[0];
            if (!file) return;
            if (file.size > 5 * 1024 * 1024) { showToast("File terlalu besar (maks 5MB)"); this.value = ""; return; }
            selectedFile = file;
            tampilPreviewFile(file);
        });

        function tampilPreviewFile(file) {
            document.getElementById("previewName").textContent = file.name;
            document.getElementById("previewSize").textContent = formatBytes(file.size);
            var thumb = document.getElementById("previewThumb");
            thumb.innerHTML = "";
            if (file.type.startsWith("image/")) {
                var img = document.createElement("img");
                img.className = "file-preview-thumb";
                img.src = URL.createObjectURL(file);
                thumb.appendChild(img);
            } else {
                var pdfIcon = document.createElement("div");
                pdfIcon.className = "file-preview-pdf";
                pdfIcon.textContent = "📄";
                thumb.appendChild(pdfIcon);
            }
            document.getElementById("filePreview").style.display = "flex";
        }

        document.getElementById("removeFile").addEventListener("click", function() {
            selectedFile = null;
            document.getElementById("fileInput").value = "";
            document.getElementById("filePreview").style.display = "none";
        });

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + " B";
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }

        function showToast(msg) {
            var t = document.getElementById("toast");
            t.textContent = msg;
            t.classList.add("show");
            setTimeout(function() { t.classList.remove("show"); }, 2500);
        }

        document.getElementById("welcomeInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); kirimDariWelcome(); }
        });
        document.getElementById("welcomeSendBtn").addEventListener("click", kirimDariWelcome);

        function kirimDariWelcome() {
            var pesan = document.getElementById("welcomeInput").value.trim();
            if (!pesan) return;
            sembunyikanWelcome();
            document.getElementById("input").value = pesan;
            kirim();
        }

        document.getElementById("btnKirim").addEventListener("click", kirim);

        document.getElementById("input").addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); kirim(); }
        });

        document.getElementById("input").addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        function sembunyikanWelcome() {
            document.getElementById("welcomeScreen").classList.add("hidden");
            setTimeout(function() { document.getElementById("welcomeScreen").style.display = "none"; }, 500);
        }

        function loadingMulai() {
            var btn = document.getElementById("btnKirim");
            btn.classList.add("loading");
            btn.disabled = true;
        }

        function loadingSelesai() {
            var btn = document.getElementById("btnKirim");
            btn.classList.remove("loading");
            btn.disabled = false;
        }

        function kirim() {
            var pesan = document.getElementById("input").value.trim();
            if (!pesan && !selectedFile) return;
            sembunyikanWelcome();

            if (selectedFile) {
                var pesanFinal = pesan || "Tolong analisis file ini";
                tampilPesanFile(selectedFile, pesanFinal);
                document.getElementById("input").value = "";
                document.getElementById("input").style.height = "auto";
                document.getElementById("filePreview").style.display = "none";
                var formData = new FormData();
                formData.append("file", selectedFile);
                formData.append("pesan", pesanFinal);
                selectedFile = null;
                document.getElementById("fileInput").value = "";
                loadingMulai();
                tampilTyping();
                fetch("/upload", { method: "POST", body: formData })
                .then(function(res) { return res.json(); })
                .then(function(data) { hapusTyping(); loadingSelesai(); tampilPesan(data.error ? "Error: " + data.error : data.jawaban, "kaego"); })
                .catch(function() { hapusTyping(); loadingSelesai(); tampilPesan("Maaf, terjadi error saat upload. Coba lagi ya!", "kaego"); });
            } else {
                tampilPesan(pesan, "user");
                document.getElementById("input").value = "";
                document.getElementById("input").style.height = "auto";
                loadingMulai();
                tampilTyping();
                fetch("/chat", { method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({pesan: pesan}) })
                .then(function(res) { return res.json(); })
                .then(function(data) { hapusTyping(); loadingSelesai(); tampilPesan(data.jawaban, "kaego"); })
                .catch(function() { hapusTyping(); loadingSelesai(); tampilPesan("Maaf, terjadi error. Coba lagi ya!", "kaego"); });
            }
        }

        function tampilPesanFile(file, pesan) {
            var messages = document.getElementById("messages");
            var wrapper = document.createElement("div");
            wrapper.className = "message user";
            var avatar = document.createElement("div");
            avatar.className = "avatar user";
            avatar.textContent = "👤";
            var bubble = document.createElement("div");
            bubble.className = "bubble user";
            bubble.style.padding = "10px 12px";
            if (file.type.startsWith("image/")) {
                var img = document.createElement("img");
                img.className = "chat-img";
                img.src = URL.createObjectURL(file);
                bubble.appendChild(img);
            } else {
                var label = document.createElement("div");
                label.className = "file-label";
                label.innerHTML = "📄 " + file.name;
                bubble.appendChild(label);
            }
            if (pesan && pesan !== "Tolong analisis file ini") {
                var teksEl = document.createElement("div");
                teksEl.style.fontSize = "15px";
                teksEl.textContent = pesan;
                bubble.appendChild(teksEl);
            }
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            messages.appendChild(wrapper);
            messages.scrollTop = messages.scrollHeight;
        }

        function tampilPesan(teks, tipe) {
            var messages = document.getElementById("messages");
            var wrapper = document.createElement("div");
            wrapper.className = "message " + tipe;
            var avatar = document.createElement("div");
            avatar.className = "avatar " + tipe;
            if (tipe === "kaego") {
                avatar.innerHTML = '<img src="/static/avatar-static.png" alt="K" style="width:36px;height:36px;border-radius:50%;object-fit:contain;">';
            } else {
                avatar.textContent = "👤";
            }
            var bubble = document.createElement("div");
            bubble.className = "bubble " + tipe;
            if (tipe === "kaego") {
                teks = teks.replace(/\*\*(.*?)\*\*/g, '<span style="font-weight:600">$1</span>');
                teks = teks.replace(/\*(.*?)\*/g, '<em>$1</em>');
                teks = teks.replace(/^[\-\*]\s*/gm, '');
                bubble.innerHTML = teks.split('\n').map(function(line) { return '<p>' + line + '</p>'; }).join('');
            } else {
                bubble.textContent = teks;
            }
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            messages.appendChild(wrapper);
            messages.scrollTop = messages.scrollHeight;
        }

        function tampilTyping() {
            var messages = document.getElementById("messages");
            var div = document.createElement("div");
            div.id = "typing";
            div.className = "message";
            div.innerHTML = '<div class="avatar kaego"><img src="/static/avatar.gif" alt="K" style="width:36px;height:36px;border-radius:50%;object-fit:contain;"></div><div class="bubble kaego">Kaego sedang mengetik...</div>';
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function hapusTyping() {
            var typing = document.getElementById("typing");
            if (typing) typing.remove();
        }
    </script>
</body>
</html>
