<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kaego AI</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: Arial, sans-serif; background: #f0f2f5; height: 100vh; display: flex; justify-content: center; align-items: center; }
    .chat-container { width: 420px; height: 600px; background: white; border-radius: 16px; display: flex; flex-direction: column; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
    .chat-header { background: #6c63ff; color: white; padding: 16px 20px; font-size: 18px; font-weight: bold; }
    .chat-header span { font-size: 13px; font-weight: normal; display: block; opacity: 0.8; }
    .chat-messages { flex: 1; padding: 16px; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
    .bubble { max-width: 75%; padding: 10px 14px; border-radius: 16px; font-size: 14px; line-height: 1.5; word-wrap: break-word; overflow-wrap: anywhere; }
    .bubble.user { background: #6c63ff; color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
    .bubble.kaego { background: #f0f2f5; color: #333; align-self: flex-start; border-bottom-left-radius: 4px; }
    .bubble p { font-size: 14px; margin: 2px 0; word-wrap: break-word; overflow-wrap: anywhere; }
    .chat-input { display: flex; padding: 12px; border-top: 1px solid #eee; gap: 8px; align-items: flex-end; }
    .chat-input textarea { flex: 1; min-width: 0; padding: 10px 14px; border: 1px solid #ddd; border-radius: 20px; outline: none; font-size: 14px; resize: none; font-family: Arial, sans-serif; max-height: 120px; line-height: 1.5; }
    .chat-input button { background: #6c63ff; color: white; border: none; padding: 10px 18px; border-radius: 20px; cursor: pointer; font-size: 14px; flex-shrink: 0; }
    .chat-input button:hover { background: #5a52d5; }
    .typing { color: #999; font-size: 13px; font-style: italic; }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            Kaego AI
            <span>Asisten pribadi kamu</span>
        </div>
        <div class="chat-messages" id="messages">
            <div class="bubble kaego">Halo Kak! Aku Kaego, asisten AI kamu. Ada yang bisa aku bantu nih? 😊</div>
        </div>
        <div class="chat-input">
            <textarea id="input" placeholder="Ketik pesan..." rows="1"></textarea>
            <button id="btnKirim">Kirim</button>
        </div>
    </div>

    <script>
        var inputEl = document.getElementById("input");
        var btnEl = document.getElementById("btnKirim");

        btnEl.addEventListener("click", kirim);

        inputEl.addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                kirim();
            }
        });

        inputEl.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        function kirim() {
            var pesan = inputEl.value.trim();
            if (!pesan) return;

            tampilPesan(pesan, "user");
            inputEl.value = "";
            inputEl.style.height = "auto";

            tampilPesan("Kaego sedang mengetik...", "typing");

            fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({pesan: pesan})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                hapusTyping();
                tampilPesan(data.jawaban, "kaego");
            })
            .catch(function(err) {
                hapusTyping();
                tampilPesan("Maaf, terjadi error. Coba lagi ya!", "kaego");
            });
        }

        function tampilPesan(teks, tipe) {
            var messages = document.getElementById("messages");
            var div = document.createElement("div");
            div.className = tipe === "typing" ? "typing" : "bubble " + tipe;
            div.id = tipe === "typing" ? "typing" : "";
            if (tipe === "kaego") {
                teks = teks.replace(/\*\*(.*?)\*\*/g, '<span style="font-weight:bold;font-size:14px">$1</span>');
                teks = teks.replace(/\*(.*?)\*/g, '<em>$1</em>');
                teks = teks.replace(/^[\-\*]\s*/gm, '');
                div.innerHTML = teks.split('\n').map(function(line) {
                    return '<p style="margin:2px 0">' + line + '</p>';
                }).join('');
            } else {
                div.textContent = teks;
            }
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function hapusTyping() {
            var typing = document.getElementById("typing");
            if (typing) typing.remove();
        }
    </script>
</body>
</html>
