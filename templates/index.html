<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Kaego AI">
<meta name="theme-color" content="#1a1a1a">
    <title>Kaego AI</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; display: flex; flex-direction: column; color: #e0e0e0; }
   .header { padding: 8px 20px; display: flex; align-items: center; gap: 8px; background: #1a1a1a; border-bottom: 1px solid #2a2a2a; }
.header img { height: 40px; width: auto; max-width: 150px; }
    .header-subtitle { font-size: 13px; color: #888; }
    .chat-messages { flex: 1; overflow-y: auto; padding: 24px; display: flex; flex-direction: column; gap: 20px; max-width: 800px; width: 100%; margin: 0 auto; }
    .message { display: flex; gap: 12px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
    .avatar.kaego { background: linear-gradient(135deg, #1a6bff, #00c6ff); color: white; }
    .avatar.user { background: #2a2a2a; color: #aaa; font-size: 18px; }
    .bubble { max-width: 80%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-wrap: break-word; overflow-wrap: anywhere; }
    .bubble.user { background: #1a6bff; color: white; border-bottom-right-radius: 4px; }
    .bubble.kaego { background: #1e1e1e; color: #e0e0e0; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }
    .bubble p { margin: 3px 0; font-size: 15px; }
    .input-area { padding: 16px 24px; background: #1a1a1a; border-top: 1px solid #2a2a2a; position: sticky; bottom: 0; z-index: 100; }
    .input-box { max-width: 800px; margin: 0 auto; display: flex; gap: 10px; align-items: flex-end; background: #2a2a2a; border-radius: 24px; padding: 10px 16px; border: 1.5px solid #333; transition: border 0.2s; }
    .input-box:focus-within { border-color: #1a6bff; }
    .input-box textarea { flex: 1; border: none; background: transparent; outline: none; font-size: 15px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; color: #e0e0e0; }
    .input-box textarea::placeholder { color: #555; }
    .send-btn { background: #1a6bff; color: white; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: background 0.2s; }
    .send-btn:hover { background: #0055dd; }
    .send-btn svg { width: 18px; height: 18px; fill: white; }
    .typing { color: #555; font-size: 14px; font-style: italic; padding: 4px 0; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #1a1a1a; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    </style>
</head>
<body>
    <div class="header">
        <img src="/static/logo.png" alt="Kaego Logo">
        <span class="header-subtitle">AI Assistant</span>
    </div>

    <div class="chat-messages" id="messages">
        <div class="message">
            <div class="avatar kaego">K</div>
            <div class="bubble kaego">
                <p>Halo Kak! 👋 Aku Kaego, asisten AI kamu.</p>
                <p>Ada yang bisa aku bantu nih? 😊</p>
            </div>
        </div>
    </div>

    <div class="input-area">
        <div class="input-box">
            <textarea id="input" placeholder="Tanya Kaego atau ketik /gambar [deskripsi]..." rows="1"></textarea>
            <button class="send-btn" id="btnKirim">
                <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                    <path d="M2 21l21-9L2 3v7l15 2-15 2z"/>
                </svg>
            </button>
            </div>
    </div>

    <script>
        // Fix keyboard mobile
window.addEventListener('resize', function() {
    document.querySelector('.input-area').scrollIntoView(false);
    window.scrollTo(0, document.body.scrollHeight);
});
      function setHeight() {
    document.body.style.height = window.innerHeight + 'px';
}
setHeight();
window.addEventListener('resize', setHeight);  
var inputEl = document.getElementById("input");
        var btnEl = document.getElementById("btnKirim");

        btnEl.addEventListener("click", kirim);

        inputEl.addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !e.shiftKey) {
                e.preventDefault();
                kirim();
            }
        });

        inputEl.addEventListener("input", function() {
            this.style.height = "auto";
            this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        function kirim() {
    var pesan = inputEl.value.trim();
    if (!pesan) return;

    if (pesan.toLowerCase().startsWith("/gambar ")) {
        var prompt = pesan.substring(8);
        tampilPesan(pesan, "user");
        inputEl.value = "";
        inputEl.style.height = "auto";
        tampilTyping();

        fetch("/generate-image", {
            method: "POST",
            headers: {"Content-Type": "application/json"},
            body: JSON.stringify({prompt: prompt})
        })
        .then(function(res) { return res.json(); })
        .then(function(data) {
            hapusTyping();
            var messages = document.getElementById("messages");
            var wrapper = document.createElement("div");
            wrapper.className = "message kaego";
            var avatar = document.createElement("div");
            avatar.className = "avatar kaego";
            avatar.textContent = "K";
            var bubble = document.createElement("div");
            bubble.className = "bubble kaego";
            bubble.innerHTML = '<p>Ini gambarnya Kak! 🎨</p><br><img src="' + data.image_url + '" style="width:100%;max-width:300px;border-radius:12px;margin-top:8px;display:block;">';
            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            messages.appendChild(wrapper);
            messages.scrollTop = messages.scrollHeight;
        })
        .catch(function() {
            hapusTyping();
            tampilPesan("Maaf, gagal generate gambar. Coba lagi ya!", "kaego");
        });
        return;
    }

            tampilPesan(pesan, "user");
            inputEl.value = "";
            inputEl.style.height = "auto";

            tampilTyping();

            fetch("/chat", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({pesan: pesan})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                hapusTyping();
                tampilPesan(data.jawaban, "kaego");
            })
            .catch(function() {
                hapusTyping();
                tampilPesan("Maaf, terjadi error. Coba lagi ya!", "kaego");
            });
        }

        function tampilPesan(teks, tipe) {
            var messages = document.getElementById("messages");
            var wrapper = document.createElement("div");
            wrapper.className = "message " + tipe;

            var avatar = document.createElement("div");
            avatar.className = "avatar " + tipe;
            avatar.textContent = tipe === "kaego" ? "K" : "👤";

            var bubble = document.createElement("div");
            bubble.className = "bubble " + tipe;

            if (tipe === "kaego") {
                teks = teks.replace(/\*\*(.*?)\*\*/g, '<span style="font-weight:600">$1</span>');
                teks = teks.replace(/\*(.*?)\*/g, '<em>$1</em>');
                teks = teks.replace(/^[\-\*]\s*/gm, '');
                bubble.innerHTML = teks.split('\n').map(function(line) {
                    return '<p>' + line + '</p>';
                }).join('');
            } else {
                bubble.textContent = teks;
            }

            wrapper.appendChild(avatar);
            wrapper.appendChild(bubble);
            messages.appendChild(wrapper);
            messages.scrollTop = messages.scrollHeight;
        }

        function tampilTyping() {
            var messages = document.getElementById("messages");
            var div = document.createElement("div");
            div.id = "typing";
            div.className = "typing";
            div.textContent = "Kaego sedang mengetik...";
            messages.appendChild(div);
            messages.scrollTop = messages.scrollHeight;
        }

        function hapusTyping() {
            var typing = document.getElementById("typing");
            if (typing) typing.remove();
        }
    </script>
</body>
</html>
