    .modal-btn-rpp { background: #34d399; color: #080f0b; }
    .modal-profil-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 2000; display: none; align-items: center; justify-content: center; }
    .modal-profil-overlay.show { display: flex; }
    .modal-profil { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 20px; padding: 28px; width: 90%; max-width: 400px; max-height: 90vh; overflow-y: auto; }
    .profil-avatar { width: 80px; height: 80px; border-radius: 50%; object-fit: cover; display: block; margin: 0 auto 20px; border: 2px solid #333; background: #2a2a2a; }
    .profil-avatar-placeholder { width: 80px; height: 80px; border-radius: 50%; background: #2a2a2a; border: 2px solid #333; display: flex; align-items: center; justify-content: center; margin: 0 auto 20px; font-size: 32px; }
    .profil-label { font-size: 12px; color: #888; margin-bottom: 6px; }
    .profil-value { font-size: 14px; color: #ccc; background: #111; padding: 10px 14px; border-radius: 10px; margin-bottom: 16px; }
    .profil-input { width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 16px; }
    .profil-input:focus { border-color: #1a6bff; }
    .profil-select { width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 20px; cursor: pointer; }
    .profil-btn { width: 100%; padding: 12px; background: #1a6bff; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; font-family: inherit; }
    .profil-btn:hover { background: #0055dd; }
    .sidebar-footer { padding: 12px 8px; border-top: 1px solid #222; display: flex; flex-direction: column; gap: 4px; }
    .sidebar-footer-item { display: flex; align-items: center; gap: 8px; padding: 8px 12px; border-radius: 10px; font-size: 13px; color: #888; cursor: pointer; background: transparent; border: none; font-family: inherit; transition: background 0.2s, color 0.2s; width: 100%; text-align: left; text-decoration: none; }
    .sidebar-footer-item:hover { background: #1a1a1a; color: #fff; }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 1001; display: none; pointer-events: none; }
    .sidebar-overlay.show { display: block; }
    .header { padding: 8px 20px; display: flex; align-items: center; gap: 8px; background: #0f0f0f; border-bottom: 1px solid #1a1a1a; flex-shrink: 0; z-index: 100; }
    .header img.logo { height: 40px; width: auto; max-width: 150px; }
    .menu-btn { background: transparent; border: none; cursor: pointer; color: #888; display: flex; align-items: center; justify-content: center; padding: 4px; border-radius: 8px; transition: color 0.2s; flex-shrink: 0; }
    .menu-btn:hover { color: #fff; }
    .menu-btn svg { width: 22px; height: 22px; }
    .chat-area { flex: 1; overflow-y: auto; display: flex; flex-direction: column; min-height: 0; padding: 0; }
    .chat-messages { padding: 16px; display: flex; flex-direction: column; gap: 16px; max-width: 100%; width: 100%; margin: 0; }
    .message { display: flex; gap: 12px; align-items: flex-start; }
    .message.user { flex-direction: row-reverse; }
    .avatar { width: 36px; height: 36px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: bold; }
    .avatar.kaego { background: transparent; }
    .avatar.kaego img { width: 36px; height: 36px; border-radius: 50%; object-fit: contain; }
    .avatar.user { background: #2a2a2a; color: #aaa; font-size: 18px; overflow: hidden; }
    .bubble { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 15px; line-height: 1.6; word-wrap: break-word; overflow-wrap: anywhere; }
    .bubble.user { background: #1a6bff; color: white; border-bottom-right-radius: 4px; }
    .bubble.kaego { background: #1e1e1e; color: #e0e0e0; border-bottom-left-radius: 4px; border: 1px solid #2a2a2a; }
    .bubble p { margin: 3px 0; font-size: 15px; }
    .btn-download { display: inline-flex; align-items: center; gap: 6px; background: transparent; border: 1px solid #333; color: #888; padding: 5px 12px; border-radius: 8px; font-size: 12px; cursor: pointer; font-family: inherit; margin-top: 8px; margin-left: 48px; transition: border-color 0.2s, color 0.2s; width: fit-content; }
    .btn-download:hover { border-color: #14b8a6; color: #14b8a6; }
    .input-area { padding: 8px 16px 16px; background: #0f0f0f; border-top: 1px solid #1a1a1a; flex-shrink: 0; z-index: 100; }
    .input-box { max-width: 100%; margin: 0; display: flex; gap: 10px; align-items: center; background: #1e1e1e; border-radius: 24px; padding: 10px 16px; border: 1.5px solid #333; transition: border 0.2s; flex-wrap: wrap; }
    .input-box:focus-within { border-color: #1a6bff; }
    .input-box textarea { flex: 1; border: none; background: transparent; outline: none; font-size: 15px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; color: #e0e0e0; min-width: 0; padding-top: 0; align-self: center; }
    .input-box textarea::placeholder { color: #555; }
    .upload-btn { background: transparent; border: none; cursor: pointer; width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center; justify-content: center; flex-shrink: 0; color: #666; transition: color 0.2s; }
    .upload-btn:hover { color: #1a6bff; }
    .upload-btn svg { width: 20px; height: 20px; }
    .send-btn { background: transparent; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; padding: 0; }
    .send-btn::before { content: ''; position: absolute; inset: 0; border-radius: 50%; padding: 3px; background: conic-gradient(from 0deg, #f97316, #14b8a6, #3b82f6, #f97316); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
    .send-btn:hover::before { opacity: 0.8; }
    .send-btn.loading::before { animation: spin 0.8s linear infinite; }
    .send-btn:not(.loading)::after { content: ''; position: absolute; width: 10px; height: 10px; border-right: 2.5px solid #14b8a6; border-top: 2.5px solid #14b8a6; border-radius: 1px; transform: rotate(45deg) translate(-1px, 1px); }
    @keyframes spin { to { transform: rotate(360deg); } }
    .file-preview { width: 100%; display: flex; align-items: center; gap: 10px; padding: 8px 4px 0 4px; border-top: 1px solid #2a2a2a; margin-top: 4px; }
    .file-preview-thumb { width: 48px; height: 48px; border-radius: 8px; object-fit: cover; border: 1px solid #333; background: #2a2a2a; flex-shrink: 0; }
    .file-preview-pdf { width: 48px; height: 48px; border-radius: 8px; background: #2a1a1a; border: 1px solid #4a2a2a; display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
    .file-preview-info { flex: 1; min-width: 0; }
    .file-preview-name { font-size: 13px; color: #ccc; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-preview-size { font-size: 11px; color: #666; margin-top: 2px; }
    .file-preview-remove { background: transparent; border: none; cursor: pointer; color: #666; font-size: 18px; line-height: 1; padding: 4px; transition: color 0.2s; flex-shrink: 0; }
    .file-preview-remove:hover { color: #ff4444; }
    .bubble img.chat-img { max-width: 100%; border-radius: 10px; display: block; margin-bottom: 8px; border: 1px solid #333; }
    .bubble .file-label { font-size: 12px; color: #888; margin-bottom: 6px; display: flex; align-items: center; gap: 4px; }
    ::-webkit-scrollbar { width: 6px; }
    ::-webkit-scrollbar-track { background: #0f0f0f; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    pre { white-space: pre !important; overflow-x: auto; }
pre code { white-space: pre !important; display: block; line-height: 1.5; }
    .welcome-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; display: flex; flex-direction: column; justify-content: center; align-items: center; z-index: 999; transition: opacity 0.5s ease; pointer-events: all; }

    .welcome-greeting { font-size: 13px; color: #888; margin-bottom: 8px; letter-spacing: 2px; text-transform: uppercase; }
    .welcome-name { font-size: 36px; font-weight: 700; color: #fff; margin-bottom: 40px; text-align: center; }

    .welcome-input-box:focus-within { border-color: #1a6bff; }
    .welcome-input-box textarea { flex: 1; border: none; background: transparent; outline: none; font-size: 15px; font-family: inherit; resize: none; max-height: 120px; line-height: 1.5; color: #e0e0e0; align-self: center; }
    .welcome-input-box textarea::placeholder { color: #555; }
    .welcome-send-btn { background: transparent; border: none; width: 36px; height: 36px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; position: relative; padding: 0; }
    .welcome-send-btn::before { content: ''; position: absolute; inset: 0; border-radius: 50%; padding: 3px; background: conic-gradient(from 0deg, #f97316, #14b8a6, #3b82f6, #f97316); -webkit-mask: linear-gradient(#fff 0 0) content-box, linear-gradient(#fff 0 0); -webkit-mask-composite: xor; mask-composite: exclude; }
    .welcome-send-btn::after { content: ''; position: absolute; width: 10px; height: 10px; border-right: 2.5px solid #14b8a6; border-top: 2.5px solid #14b8a6; border-radius: 1px; transform: rotate(45deg) translate(-1px, 1px); }

    .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: #333; color: #eee; padding: 10px 20px; border-radius: 20px; font-size: 13px; z-index: 9999; opacity: 0; transition: opacity 0.3s; pointer-events: none; white-space: nowrap; }

    .sidebar-item-wrap { display: flex; align-items: center; gap: 4px; }

    .quota-badge.rendah { color: #f0b429; border-color: #3a2a00; }
    .quota-badge.kritis { color: #ff5555; border-color: #3a0000; }

    <script>
        function getSapaan() {

            if (jam >= 11 && jam < 15) return "Selamat siang 🌤️";
            if (jam >= 15 && jam < 18) return "Selamat sore 🌅";

        }

        var namaUser = "{{ nama }}";
        var fotoProfil = "";
fetch("/profil").then(function(r){return r.json();}).then(function(data) {
    if (data.profil && data.profil.foto_profil) {
        fotoProfil = data.profil.foto_profil;
        document.getElementById("avatarSidebar").innerHTML = '<img src="' + fotoProfil + '" style="width:100%;height:100%;object-fit:cover;">';
    }
});
        document.getElementById("welcomeGreeting").textContent = getSapaan();
        document.getElementById("welcomeName").textContent = namaUser;
        document.getElementById("namaUserSidebar").textContent = namaUser;

       

        var modalFitur = document.getElementById("modalFitur");
        var modalFiturBox = document.getElementById("modalFiturBox");

        var kontenFitur = {
            rangkuman: {
                judul: "📚 Rangkuman Materi",
                html: '<div class="modal-label">Materi</div><input class="modal-input" id="fRangkumanMateri" type="text" placeholder="Contoh: Fotosintesis"><div class="modal-label">Kelas</div><input class="modal-input" id="fRangkumanKelas" type="text" placeholder="Contoh: 7 SMP"><button class="modal-btn modal-btn-rangkuman" onclick="kirimFitur(\'rangkuman\')">Buat Rangkuman</button>',
                kirim: function() {
                    var materi = document.getElementById("fRangkumanMateri").value.trim();
                    var kelas = document.getElementById("fRangkumanKelas").value.trim();
                    if (!materi) { showToast("Isi nama materi dulu!"); return; }
                    var prompt = "Buatkan rangkuman materi " + materi;
                    if (kelas) prompt += " untuk siswa kelas " + kelas;
                    prompt += " dengan bahasa yang mudah dipahami. Sertakan poin-poin penting.";
                    return prompt;
                }
            },
            soal: {
                judul: "📝 Buat Soal Otomatis",
                html: '<div class="modal-label">Mata Pelajaran</div><input class="modal-input" id="fSoalMapel" type="text" placeholder="Contoh: IPA"><div class="modal-label">Materi</div><input class="modal-input" id="fSoalMateri" type="text" placeholder="Contoh: Sistem Pencernaan"><div class="modal-label">Kelas & Tipe Soal</div><div class="modal-row" style="gap:8px;"><input class="modal-input" id="fSoalKelas" type="text" placeholder="Kelas" style="max-width:90px;"><select class="modal-select" id="fSoalTipe"><option value="pilihan ganda">Pilihan Ganda</option><option value="essay">Essay</option><option value="benar salah">Benar/Salah</option><option value="isian singkat">Isian Singkat</option></select><select class="modal-select" id="fSoalJumlah" style="max-width:90px;"><option value="5">5 soal</option><option value="10" selected>10 soal</option><option value="15">15 soal</option><option value="20">20 soal</option></select></div><button class="modal-btn modal-btn-soal" onclick="kirimFitur(\'soal\')">Buat Soal ✨</button>',
                kirim: function() {
                    var mapel = document.getElementById("fSoalMapel").value.trim();
                    var materi = document.getElementById("fSoalMateri").value.trim();
                    var kelas = document.getElementById("fSoalKelas").value.trim();
                    var tipe = document.getElementById("fSoalTipe").value;
                    var jumlah = document.getElementById("fSoalJumlah").value;
                    if (!mapel || !materi) { showToast("Isi mata pelajaran dan materi!"); return; }
                    var prompt = "Buatkan " + jumlah + " soal " + tipe + " mata pelajaran " + mapel;
                    if (kelas) prompt += " kelas " + kelas;
                    prompt += " tentang materi " + materi + ". Sertakan kunci jawaban di akhir.";
                    return prompt;
                }
            },
            rpp: {
                judul: "📋 Buat RPM",
                html: '<div class="modal-label">Mata Pelajaran</div><input class="modal-input" id="fRppMapel" type="text" placeholder="Contoh: Matematika"><div class="modal-label">Materi Pokok</div><input class="modal-input" id="fRppMateri" type="text" placeholder="Contoh: Persamaan Linear"><div class="modal-label">Kelas / Fase</div><div class="modal-row" style="gap:8px;"><input class="modal-input" id="fRppKelas" type="text" placeholder="Contoh: 4 / Fase B" style="flex:1;"><select class="modal-select" id="fRppPertemuan" style="max-width:120px;"><option value="1">1 pertemuan</option><option value="2" selected>2 pertemuan</option><option value="3">3 pertemuan</option><option value="4">4 pertemuan</option></select></div><div class="modal-label">Nama Guru</div><input class="modal-input" id="fRppGuru" type="text" placeholder="Nama Guru"><div class="modal-label">Nama Sekolah</div><input class="modal-input" id="fRppSekolah" type="text" placeholder="Nama Sekolah"><button class="modal-btn modal-btn-rpp" onclick="kirimFitur(\'rpp\')">Buat RPM 📋</button>',
                kirim: function() {
                    var mapel = document.getElementById("fRppMapel").value.trim();
                    var materi = document.getElementById("fRppMateri").value.trim();
                    var kelas = document.getElementById("fRppKelas").value.trim();
                    var pertemuan = document.getElementById("fRppPertemuan").value;
                    var guru = document.getElementById("fRppGuru").value.trim();
                    var sekolah = document.getElementById("fRppSekolah").value.trim();
                    if (!mapel || !materi) { showToast("Isi mata pelajaran dan materi!"); return; }
                    var prompt = "Buatkan RPM (Rencana Pembelajaran Mendalam) lengkap dengan format berikut:\n\n";
                    prompt += "IDENTITAS:\n- Satuan Pendidikan: " + (sekolah || "[nama sekolah]") + "\n- Semester/Tahun: [semester/tahun]\n- Mata Pelajaran: " + mapel + "\n- Kelas/Fase: " + (kelas || "[kelas/fase]") + "\n- Alokasi Waktu: " + pertemuan + " pertemuan\n- Guru: " + (guru || "[nama guru]") + "\n\n";
                    prompt += "IDENTIFIKASI MATA PELAJARAN:\n- Materi: " + materi + "\n- Peserta Didik (Prasyarat): [isi]\n- Dimensi Profil Lulusan: [pilih dari 8 profil]\n- Capaian Pembelajaran: [isi CP]\n- Lintas Disiplin Ilmu: [isi]\n- Tujuan Pembelajaran: [isi tujuan]\n- Topik Pembelajaran: [isi topik]\n\n";
                    prompt += "EMPAT KERANGKA PEMBELAJARAN MENDALAM:\n1. Praktis Pedagogis: [isi]\n2. Kemitraan Pembelajaran: [isi]\n3. Lingkungan Pembelajaran: [isi]\n4. Pemanfaatan Digital: [isi]\n\n";
                    prompt += "PENGALAMAN BELAJAR:\n- Awal/Apersepsi: [isi]\n- Inti: [isi langkah pembelajaran]\n- Penutup: [isi]\n\n";
                    prompt += "ASESMEN:\n- Diagnostik: [isi]\n- Formatif: [isi]\n- Sumatif: [isi]\n\n";
                    prompt += "PENGAYAAN DAN REMEDIAL:\n- Pengayaan: [isi]\n- Remedial: [isi]\n\n";
                    prompt += "REFLEKSI:\n- Refleksi Peserta Didik: [isi]\n- Refleksi Pendidik: [isi]\n\n";
                    prompt += "Tolong lengkapi semua bagian dengan konten yang sesuai materi " + materi + ". Buat ringkas tapi lengkap, maksimal 2-3 kalimat per bagian.";
                    return prompt;
                }
            },
            koreksi: {
                judul: "✅ Koreksi Jawaban Siswa",
                html: '<div class="modal-label">Kunci Jawaban (simpan sekali, pakai berkali-kali)</div><textarea class="modal-input" id="fKoreksiKunci" rows="4" placeholder="Tulis kunci jawaban di sini..." style="resize:vertical;"></textarea><button onclick="simpanKunci()" style="background:#34d399;color:#080f0b;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;font-weight:600;margin-top:8px;width:100%;">💾 Simpan Kunci Jawaban</button><div style="border-top:1px solid #333;margin:16px 0;"></div><div class="modal-label">Nama Siswa</div><input class="modal-input" id="fKoreksiNama" type="text" placeholder="Contoh: Budi"><div style="margin-top:10px;"><button onclick="document.getElementById(\'fotoKoreksiInput\').click()" style="background:#1a6bff;color:white;border:none;padding:10px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-family:inherit;width:100%;">📸 Pilih Foto Tugas Siswa</button></div><div id="previewKoreksi" style="margin-top:8px;display:none;"><img id="imgKoreksiPreview" style="max-width:100%;border-radius:8px;border:1px solid #333;"></div><button class="modal-btn modal-btn-rangkuman" onclick="kirimKoreksi()" style="margin-top:16px;">✅ Koreksi Sekarang</button>',
                kirim: function() { return null; }
            },
            latihan: {
                judul: "🎯 Latihan Soal",
                html: '<div class="modal-label">Materi</div><input class="modal-input" id="fLatihanMateri" type="text" placeholder="Contoh: Perang Dunia II"><div class="modal-label">Kelas</div><input class="modal-input" id="fLatihanKelas" type="text" placeholder="Contoh: 11 SMA"><button class="modal-btn modal-btn-soal" onclick="kirimFitur(\'latihan\')">Buat Latihan 🎯</button>',
                kirim: function() {
                    var materi = document.getElementById("fLatihanMateri").value.trim();
                    var kelas = document.getElementById("fLatihanKelas").value.trim();
                    if (!materi) { showToast("Isi materi dulu!"); return; }
                    var prompt = "Buatkan 5 soal latihan beserta pembahasannya untuk materi " + materi;
                    if (kelas) prompt += " kelas " + kelas;
                    return prompt;
                }
            }
        };

        var fiturAktif = null;

        function bukaModalFitur(tipe) {
            fiturAktif = tipe;
            var f = kontenFitur[tipe];
            modalFiturBox.innerHTML = '<div class="modal-header"><span class="modal-title">' + f.judul + '</span><button class="modal-close" onclick="tutupModalFitur()">✕</button></div>' + f.html;
            modalFitur.classList.add("show");
            tutupSidebar();
        }

        function tutupModalFitur() { modalFitur.classList.remove("show"); fiturAktif = null; }

        function kirimFitur(tipe) {
            var prompt = kontenFitur[tipe].kirim();
            if (!prompt) return;
            tutupModalFitur();
            sembunyikanWelcome();
            kirimPesan(prompt);
        }

        modalFitur.addEventListener("click", function(e) { if (e.target === this) tutupModalFitur(); });

        var sidebar = document.getElementById("sidebar");
        var overlay = document.getElementById("sidebarOverlay");

        function bukaSidebar() { sidebar.classList.add("open"); overlay.classList.add("show"); overlay.style.pointerEvents = "all"; muatDaftarObrolan(); }
        function tutupSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("show"); overlay.style.pointerEvents = "none"; }

        document.getElementById("menuBtn").addEventListener("click", bukaSidebar);
        document.getElementById("menuBtnWelcome").addEventListener("click", bukaSidebar);
        document.getElementById("backBtn").addEventListener("click", tutupSidebar);
        overlay.addEventListener("click", tutupSidebar);

        document.getElementById("toggleRiwayat").addEventListener("click", function() {
            document.getElementById("sidebarList").classList.toggle("open");
            this.classList.toggle("open");
        });

        document.getElementById("toggleFitur").addEventListener("click", function() {
            document.getElementById("fiturList").classList.toggle("open");
            this.classList.toggle("open");
        });

        document.getElementById("sidebarNewBtn").addEventListener("click", function() { mulaiObrolanBaru(); tutupSidebar(); });

        document.getElementById("btnProfil").addEventListener("click", function() { bukaProfil(); tutupSidebar(); });
        document.getElementById("tutupProfil").addEventListener("click", function() { document.getElementById("modalProfil").classList.remove("show"); });
        document.getElementById("modalProfil").addEventListener("click", function(e) { if (e.target === this) this.classList.remove("show"); });

        function bukaProfil() {
            fetch("/profil").then(function(r){return r.json();}).then(function(data) {
                if (data.profil) {
                    var p = data.profil;
                    document.getElementById("profilEmail").textContent = p.email || "-";
                    document.getElementById("profilNama").value = p.nama || "";
                    document.getElementById("profilFont").value = p.gaya_font || "default";
                    var wrap = document.getElementById("profilAvatarWrap");
                    if (p.foto_profil) {
                        wrap.innerHTML = '<img class="profil-avatar" src="' + p.foto_profil + '">';
                    } else {
                        wrap.innerHTML = '<div class="profil-avatar-placeholder">👤</div>';
                    }
                }
            });
            document.getElementById("modalProfil").classList.add("show");
        }

        document.getElementById("fotoProfilInput").addEventListener("change", function(e) {
            var file = e.target.files[0]; if (!file) return;
            var reader = new FileReader();
            reader.onload = function(ev) {
                var base64 = ev.target.result;
                document.getElementById("profilAvatarWrap").innerHTML = '<img class="profil-avatar" src="' + base64 + '">';
                fetch("/profil/update", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({foto_profil:base64})});
            };
            reader.readAsDataURL(file);
        });

        var fotoKoreksiFile = null;

        document.getElementById("fotoKoreksiInput").addEventListener("change", function(e) {
            var file = e.target.files[0]; if (!file) return;
            fotoKoreksiFile = file;
            var reader = new FileReader();
            reader.onload = function(ev) {
                document.getElementById("imgKoreksiPreview").src = ev.target.result;
                document.getElementById("previewKoreksi").style.display = "block";
            };
            reader.readAsDataURL(file);
        });

        document.getElementById("simpanProfil").addEventListener("click", function() {
            var nama = document.getElementById("profilNama").value.trim();
            var font = document.getElementById("profilFont").value;
            if (!nama) { showToast("Nama tidak boleh kosong!"); return; }
            fetch("/profil/update", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({nama:nama,gaya_font:font})})
            .then(function(r){return r.json();}).then(function(data) {
                if (data.success) {
                    var fontMap = {"default":"'Segoe UI', Arial, sans-serif","serif":"Georgia, serif","mono":"'Courier New', monospace","rounded":"'Varela Round', sans-serif"};
                    document.body.style.fontFamily = fontMap[font] || fontMap["default"];
                    namaUser = nama;
                    document.getElementById("welcomeName").textContent = nama;
                    document.getElementById("namaUserSidebar").textContent = nama;
                    document.getElementById("modalProfil").classList.remove("show");
                    showToast("Profil berhasil disimpan!");
                }
            });
        });

        function simpanKunci() {
            var kunci = document.getElementById("fKoreksiKunci").value.trim();
            if (!kunci) { showToast("Isi kunci jawaban dulu!"); return; }
            fetch("/simpan_kunci", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({kunci:kunci})})
            .then(function(r){return r.json();})
            .then(function(data) { if (data.success) showToast("Kunci jawaban tersimpan! ✅"); });
        }

        function kirimKoreksi() {
            var nama = document.getElementById("fKoreksiNama").value.trim() || "Siswa";
            if (!fotoKoreksiFile) { showToast("Pilih foto tugas siswa dulu!"); return; }
            tutupModalFitur();
            sembunyikanWelcome();
            var pesanKoreksi = "Tolong koreksi jawaban siswa bernama " + nama + " pada foto ini. Berikan nilai (0-100) dan penjelasan untuk setiap jawaban yang salah.";
            tampilPesanFile(fotoKoreksiFile, pesanKoreksi);
            var formData = new FormData();
            formData.append("file", fotoKoreksiFile);
            formData.append("pesan", pesanKoreksi);
            fotoKoreksiFile = null;
            loadingMulai(); tampilTyping();
            fetch("/upload", {method:"POST", body:formData})
            .then(function(r){return r.json();})
            .then(function(data) { hapusTyping(); loadingSelesai(); tampilPesan(data.error ? "Error: " + data.error : data.jawaban, "kaego"); })
            .catch(function() { hapusTyping(); loadingSelesai(); tampilPesan("Kaego sedang sibuk, mohon coba beberapa saat lagi ya! 🙏", "kaego"); });
        }

        function muatDaftarObrolan() {
            fetch("/daftar_obrolan").then(function(r){return r.json();}).then(function(data) {
                var list = document.getElementById("sidebarList");
                list.innerHTML = "";
                if (!data.obrolan || data.obrolan.length === 0) { list.innerHTML = '<div class="sidebar-empty">Belum ada obrolan</div>'; return; }
                data.obrolan.forEach(function(item) {
                    var div = document.createElement("div"); div.className = "sidebar-item";
                    div.textContent = item.judul || "Obrolan";
                    div.addEventListener("click", function() { bukaObrolan(item.id, item.judul); });
                    var wrap = document.createElement("div"); wrap.className = "sidebar-item-wrap";
                    var btnHapus = document.createElement("button"); btnHapus.className = "btn-hapus-obrolan"; btnHapus.textContent = "🗑️";
                    btnHapus.addEventListener("click", function(e) { e.stopPropagation(); hapusObrolan(item.id, wrap); });
                    wrap.appendChild(div); wrap.appendChild(btnHapus); list.appendChild(wrap);
                });
            });
        }

        function bukaObrolan(id, judul) {
            fetch("/buka_obrolan/" + id).then(function(r){return r.json();}).then(function(data) {
                var messages = document.getElementById("messages");
                messages.innerHTML = "";
                if (data.riwayat) {
                    data.riwayat.forEach(function(item) { tampilPesan(item.pesan, "user"); tampilPesan(item.jawaban, "kaego"); });
                    scrollKeBawah();
                }
                tutupSidebar(); sembunyikanWelcome();
                showToast("Membuka: " + (judul || "Obrolan"));
            });
        }

        function mulaiObrolanBaru() {
            fetch("/reset", {method:"POST"}).then(function(r){return r.json();}).then(function(data) {
                if (data.success) { document.getElementById("messages").innerHTML = ""; showToast("Obrolan baru dimulai!"); }
            });
        }

        fetch("/riwayat").then(function(r){return r.json();}).then(function(data) {
            if (data.riwayat && data.riwayat.length > 0) {
                data.riwayat.forEach(function(item) { tampilPesan(item.pesan, "user"); tampilPesan(item.jawaban, "kaego"); });
                scrollKeBawah();
            }
        });

        var selectedFile = null;
        document.getElementById("uploadBtn").addEventListener("click", function() { document.getElementById("fileInput").click(); });
        document.getElementById("fileInput").addEventListener("change", function(e) {
            var file = e.target.files[0]; if (!file) return;
            if (file.size > 5 * 1024 * 1024) { showToast("File terlalu besar (maks 5MB)"); this.value = ""; return; }
            selectedFile = file; tampilPreviewFile(file);
        });

        function tampilPreviewFile(file) {
            document.getElementById("previewName").textContent = file.name;
            document.getElementById("previewSize").textContent = formatBytes(file.size);
            var thumb = document.getElementById("previewThumb"); thumb.innerHTML = "";
            if (file.type.startsWith("image/")) {
                var img = document.createElement("img"); img.className = "file-preview-thumb"; img.src = URL.createObjectURL(file); thumb.appendChild(img);
            } else {
                var pdf = document.createElement("div"); pdf.className = "file-preview-pdf"; pdf.textContent = "📄"; thumb.appendChild(pdf);
            }
            document.getElementById("filePreview").style.display = "flex";
        }

        document.getElementById("removeFile").addEventListener("click", function() {
            selectedFile = null; document.getElementById("fileInput").value = ""; document.getElementById("filePreview").style.display = "none";
        });

        function formatBytes(bytes) {
            if (bytes < 1024) return bytes + " B";
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + " KB";
            return (bytes / (1024 * 1024)).toFixed(1) + " MB";
        }

        function showToast(msg) {
            var t = document.getElementById("toast"); t.textContent = msg; t.classList.add("show");
            setTimeout(function() { t.classList.remove("show"); }, 2500);
        }

        function scrollKeBawah() { document.getElementById("chatArea").scrollTop = document.getElementById("chatArea").scrollHeight; }

        function sembunyikanWelcome() {
            document.getElementById("welcomeScreen").classList.add("hidden");
            setTimeout(function() { document.getElementById("welcomeScreen").style.display = "none"; }, 500);
        }

        document.getElementById("welcomeInput").addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); kirimDariWelcome(); }
        });
        document.getElementById("welcomeSendBtn").addEventListener("click", kirimDariWelcome);

        function kirimDariWelcome() {
            var pesan = document.getElementById("welcomeInput").value.trim();
            if (!pesan) return;
            sembunyikanWelcome();
            document.getElementById("input").value = pesan;
            kirim();
        }

        document.getElementById("btnKirim").addEventListener("click", kirim);
        document.getElementById("input").addEventListener("keypress", function(e) {
            if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); kirim(); }
        });
        document.getElementById("input").addEventListener("input", function() {
            this.style.height = "auto"; this.style.height = Math.min(this.scrollHeight, 120) + "px";
        });

        function loadingMulai() { var btn = document.getElementById("btnKirim"); btn.classList.add("loading"); btn.disabled = true; }
        function loadingSelesai() { var btn = document.getElementById("btnKirim"); btn.classList.remove("loading"); btn.disabled = false; }

        function kirimPesan(teks) {
            tampilPesan(teks, "user");
            loadingMulai(); tampilTyping();
            fetch("/chat", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({pesan:teks})})
            .then(function(r){return r.json();})
            .then(function(data) {
                hapusTyping(); loadingSelesai();
                if (data.error === "quota_habis") {
                    tampilNotifikasiQuota(data.pesan);
                } else {
                    tampilPesan(data.jawaban, "kaego");
                    updateQuotaBadge(data.sisa_quota, data.limit_quota);
                }
            })
            .catch(function() { hapusTyping(); loadingSelesai(); tampilPesan("Maaf, terjadi error. Coba lagi ya!", "kaego"); });
        }

        function kirim() {
            var pesan = document.getElementById("input").value.trim();
            if (!pesan && !selectedFile) return;
            sembunyikanWelcome();
            if (selectedFile) {
                var pesanFinal = pesan || "Tolong analisis file ini";
                tampilPesanFile(selectedFile, pesanFinal);
                document.getElementById("input").value = ""; document.getElementById("input").style.height = "auto"; document.getElementById("filePreview").style.display = "none";
                var formData = new FormData(); formData.append("file", selectedFile); formData.append("pesan", pesanFinal);
                selectedFile = null; document.getElementById("fileInput").value = "";
                loadingMulai(); tampilTyping();
                fetch("/upload", {method:"POST",body:formData})
                .then(function(r){return r.json();})
                .then(function(data) { hapusTyping(); loadingSelesai(); tampilPesan(data.error ? "Error: " + data.error : data.jawaban, "kaego"); })
                .catch(function() { hapusTyping(); loadingSelesai(); tampilPesan("File gagal terkirim, mohon coba beberapa saat lagi ya! 🙏", "kaego"); });
            } else {
                var teks = pesan;
                document.getElementById("input").value = ""; document.getElementById("input").style.height = "auto";
                kirimPesan(teks);
            }
        }

        function tampilPesanFile(file, pesan) {
            var messages = document.getElementById("messages");
            var wrapper = document.createElement("div"); wrapper.className = "message user";
            var avatar = document.createElement("div"); avatar.className = "avatar user"; avatar.textContent = "👤";
            var bubble = document.createElement("div"); bubble.className = "bubble user"; bubble.style.padding = "10px 12px";
            if (file.type.startsWith("image/")) {
                var img = document.createElement("img"); img.className = "chat-img"; img.src = URL.createObjectURL(file); bubble.appendChild(img);
            } else {
                var label = document.createElement("div"); label.className = "file-label"; label.innerHTML = "📄 " + file.name; bubble.appendChild(label);
            }
            if (pesan && pesan !== "Tolong analisis file ini") {
                var teksEl = document.createElement("div"); teksEl.style.fontSize = "15px"; teksEl.textContent = pesan; bubble.appendChild(teksEl);
            }
            wrapper.appendChild(avatar); wrapper.appendChild(bubble); messages.appendChild(wrapper); scrollKeBawah();
        }

        function tampilPesan(teks, tipe) {
            var messages = document.getElementById("messages");
            var wrapper = document.createElement("div"); wrapper.className = "message " + tipe;
            var avatar = document.createElement("div"); avatar.className = "avatar " + tipe;
            if (tipe === "kaego") {
                avatar.innerHTML = '<img src="/static/avatar-static.png" alt="K" style="width:36px;height:36px;border-radius:50%;object-fit:contain;">';
            } else {
    if (fotoProfil) {
        avatar.innerHTML = '<img src="' + fotoProfil + '" style="width:36px;height:36px;border-radius:50%;object-fit:cover;">';
    } else {
        avatar.textContent = "👤";
    }
}
           var bubble = document.createElement("div"); bubble.className = "bubble " + tipe;
            if (tipe === "kaego") {
                teks = teks.replace(/\*\*(.*?)\*\*/g, '<span style="font-weight:600">$1</span>');
                teks = teks.replace(/\*(.*?)\*/g, '<em>$1</em>');
                teks = teks.replace(/```(\w*)\r?\n?([\s\S]*?)```/g, function(match, lang, code) {
    code = code.replace(/\r\n/g, '\n');
                    return '<pre style="background:#161616;border-left:3px solid #14b8a6;border-radius:8px;padding:14px 16px;margin:8px 0;overflow-x:auto;"><code class="' + (lang || '') + '">' + code.replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/\n/g, '&#10;') + '</code></pre>';
                });
                teks = teks.replace(/`([^`]+)`/g, '<code style="background:#2a2a3e;padding:2px 6px;border-radius:4px;font-family:monospace;font-size:13px;">$1</code>');
                teks = teks.replace(/^[\-\*]\s*/gm, '• ');
                var lines = teks.split('\n');
                var html = '';
                lines.forEach(function(line) {
                    if (line.includes('<pre') || line.includes('</pre>') || line.includes('<code') || line.includes('</code>')) {
                        html += line;
                    } else {
                        html += '<p>' + line + '</p>';
                    }
                });
                bubble.innerHTML = html;
                bubble.querySelectorAll('pre code').forEach(function(block) {
                    hljs.highlightElement(block);
                });
            } else { bubble.textContent = teks; }
            wrapper.appendChild(avatar); wrapper.appendChild(bubble); messages.appendChild(wrapper);
            wrapper.appendChild(avatar); wrapper.appendChild(bubble); messages.appendChild(wrapper);
            var isRPM = teks.indexOf("IDENTITAS") !== -1 && teks.indexOf("REFLEKSI") !== -1;
            var isSoal = teks.indexOf("SOAL") !== -1 && (teks.indexOf("1.") !== -1 || teks.indexOf("1)") !== -1);
            if (tipe === "kaego" && (isRPM || isSoal)) {
                var kontenAsli = bubble.innerText;
                var btn = document.createElement("button");
                btn.className = "btn-download";
                btn.innerHTML = isRPM ? "⬇ RPM (.docx)" : "⬇ Soal (.docx)";
                var isRPMBtn = isRPM;
                btn.addEventListener("click", function() { isRPMBtn ? downloadRPM(kontenAsli) : downloadSoal(kontenAsli); });
                messages.appendChild(btn);
            }
            scrollKeBawah();
        }
function downloadSoal(konten) {
            showToast("Menyiapkan file soal...");
            fetch("/download_soal", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({konten:konten})})
            .then(function(res) { return res.blob(); })
            .then(function(blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement("a"); a.href = url; a.download = "Soal_Kaego.docx"; a.click();
                URL.revokeObjectURL(url);
                showToast("File berhasil didownload!");
            })
            .catch(function() { showToast("Gagal download, coba lagi!"); });
        }
        function downloadRPM(konten) {
            showToast("Menyiapkan file Word...");
            fetch("/download_rpm", {method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({konten:konten})})
            .then(function(res) { return res.blob(); })
            .then(function(blob) {
                var url = URL.createObjectURL(blob);
                var a = document.createElement("a"); a.href = url; a.download = "RPM_Kaego.docx"; a.click();
                URL.revokeObjectURL(url);
                showToast("File berhasil didownload!");
            })
            .catch(function() { showToast("Gagal download, coba lagi!"); });
        }

        function tampilNotifikasiQuota(pesan) {
            var messages = document.getElementById("messages");
            var div = document.createElement("div");
            div.style.cssText = "background:#2a1a1a;border:1px solid #ff5555;border-radius:16px;padding:16px;margin:8px 0;text-align:center;";
            div.innerHTML = '<div style="font-size:24px;margin-bottom:8px;">⏳</div>' +
                '<div style="color:#ff8888;font-size:14px;margin-bottom:12px;">' + pesan + '</div>' +
                '<div style="display:flex;gap:8px;justify-content:center;">' +
                '<button onclick="this.parentElement.parentElement.remove()" style="background:#333;color:#aaa;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;">Tutup</button>' +
                '<button onclick="bukaHalamanPaket()" style="background:#f0b429;color:#0f0f08;border:none;padding:8px 16px;border-radius:8px;font-size:13px;cursor:pointer;font-weight:600;">⬆️ Upgrade Paket</button>' +
                '</div>';
            messages.appendChild(div);
            scrollKeBawah();
        }

        function bukaHalamanPaket() { window.location.href = "/paket"; }
function hapusObrolan(id, elWrap) {
            if (!confirm("Hapus obrolan ini?")) return;
            fetch("/hapus_obrolan/" + id, {method: "DELETE"})
            .then(function(r){return r.json();})
            .then(function(data) {
                if (data.success) { elWrap.remove(); showToast("Obrolan dihapus!"); }
            });
        }
function updateQuotaBadge(sisa, limit) {
            var badge = document.getElementById("quotaBadge");
            if (sisa === undefined || sisa === null) return;
            badge.style.display = "inline-block";
            badge.textContent = sisa + "/" + limit + " pesan";
            badge.className = "quota-badge";
            if (sisa <= 5) badge.classList.add("kritis");
            else if (sisa <= 10) badge.classList.add("rendah");
        }
        function tampilTyping() {
            var messages = document.getElementById("messages");
            var div = document.createElement("div"); div.id = "typing"; div.className = "message";
            div.innerHTML = '<div class="avatar kaego"><video src="/static/avatar.mp4" style="width:36px;height:36px;border-radius:50%;object-fit:contain;" autoplay loop muted playsinline></video></div><div class="bubble kaego" style="opacity:0.5;font-style:italic;">Kaego sedang mengetik...</div>';
            messages.appendChild(div); scrollKeBawah();
        }

        function hapusTyping() { var typing = document.getElementById("typing"); if (typing) typing.remove(); }
    </script>
