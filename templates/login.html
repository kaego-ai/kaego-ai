<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - Kaego AI</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #e0e0e0; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo img { height: 60px; width: auto; }
    h2 { text-align: center; font-size: 22px; margin-bottom: 24px; color: #fff; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none; }
    input:focus { border-color: #1a6bff; }

    /* Input password + tombol mata */
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 42px; }
    .toggle-pw { position: absolute; right: 12px; top: 50%; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: #666; padding: 0; display: flex; align-items: center; }
    .toggle-pw:hover { color: #aaa; }
    .toggle-pw svg { width: 18px; height: 18px; }

    button.btn-login { width: 100%; padding: 12px; background: #1a6bff; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    button.btn-login:hover { background: #0055dd; }
    .link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
    .link a { color: #1a6bff; text-decoration: none; }
    .error { color: #ff4444; font-size: 13px; text-align: center; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/static/logo.png" alt="Kaego">
        </div>
        <h2>Masuk ke Kaego</h2>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@kamu.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <div class="password-wrapper">
                <input type="password" id="password" placeholder="••••••••">
                <button class="toggle-pw" id="togglePw" tabindex="-1">
                    <!-- Ikon mata tertutup (default) -->
                    <svg id="iconTutup" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                    </svg>
                    <!-- Ikon mata terbuka -->
                    <svg id="iconBuka" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
                        <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                        <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                    </svg>
                </button>
            </div>
        </div>
        <button class="btn-login" id="btnLogin">Masuk</button>
        <div class="error" id="error"></div>
        <div class="link">Belum punya akun? <a href="/daftar">Daftar di sini</a></div>
<div class="link"><a href="/lupa-sandi" style="color:#14b8a6;">Lupa sandi?</a></div>
    </div>

    <script>
        // Toggle password
        document.getElementById("togglePw").addEventListener("click", function() {
            var input = document.getElementById("password");
            var iconTutup = document.getElementById("iconTutup");
            var iconBuka = document.getElementById("iconBuka");
            if (input.type === "password") {
                input.type = "text";
                iconTutup.style.display = "none";
                iconBuka.style.display = "block";
            } else {
                input.type = "password";
                iconTutup.style.display = "block";
                iconBuka.style.display = "none";
            }
        });

        document.getElementById("btnLogin").addEventListener("click", function() {
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            if (!email || !password) {
                document.getElementById("error").style.display = "block";
                document.getElementById("error").textContent = "Email dan password harus diisi!";
                return;
            }
            fetch("/login", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({email: email, password: password})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    window.location.href = "/";
                } else {
                    document.getElementById("error").style.display = "block";
                    document.getElementById("error").textContent = data.message;
                }
            });
        });
    </script>
</body>
</html>
