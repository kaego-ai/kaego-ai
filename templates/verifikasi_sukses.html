<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Verifikasi Berhasil - Kaego AI</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; display: flex; align-items: center; justify-content: center; height: 100vh; }
        .box { text-align: center; padding: 40px; background: #1a1a1a; border-radius: 20px; border: 1px solid #2a2a2a; max-width: 400px; width: 90%; }
        .icon { font-size: 48px; margin-bottom: 16px; }
        h2 { font-size: 22px; margin-bottom: 8px; color: #fff; }
        p { color: #888; font-size: 14px; margin-bottom: 24px; }
        a { display: inline-block; background: #1a6bff; color: white; padding: 12px 24px; border-radius: 10px; text-decoration: none; font-size: 15px; }
        a:hover { background: #0055dd; }
    </style>
</head>
<body>
    <div class="box">
        <div class="icon">✅</div>
        <h2>Email Terverifikasi!</h2>
        <p>Akun Kaego AI kamu sudah aktif. Silakan login sekarang.</p>
        <a href="/login">Masuk Sekarang</a>
    </div>
</body>
</html>
