<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Reset Sandi - Kaego AI</title>
    <link rel="icon" type="image/x-icon" href="/static/favicon.ico">
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; color: #e0e0e0; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .box { background: #141414; border: 1px solid #2a2a2a; border-radius: 20px; padding: 32px; width: 90%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo img { height: 48px; }
    h2 { font-size: 20px; color: #fff; margin-bottom: 8px; text-align: center; }
    p { font-size: 13px; color: #888; text-align: center; margin-bottom: 24px; }
    label { font-size: 12px; color: #888; display: block; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; background: #111; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none; font-family: inherit; margin-bottom: 16px; }
    input:focus { border-color: #14b8a6; }
    button.btn-simpan { width: 100%; padding: 12px; background: linear-gradient(90deg, #f97316, #14b8a6); border: none; border-radius: 10px; color: #fff; font-size: 15px; cursor: pointer; font-family: inherit; font-weight: 600; }

    /* Input password + tombol mata */
    .password-wrapper { position: relative; }
    .password-wrapper input { padding-right: 42px; }
    .toggle-pw { position: absolute; right: 12px; top: 20px; transform: translateY(-50%); background: transparent; border: none; cursor: pointer; color: #666; padding: 0; display: flex; align-items: center; width: auto; }
    .toggle-pw:hover { color: #aaa; background: transparent; }
    .toggle-pw svg { width: 18px; height: 18px; }

    .pesan { text-align: center; font-size: 13px; margin-top: 12px; padding: 10px; border-radius: 10px; display: none; }
    .pesan.sukses { background: #1a2a1a; color: #34d399; border: 1px solid #34d399; }
    .pesan.error { background: #2a1a1a; color: #ff8888; border: 1px solid #ff5555; }
    </style>
</head>
<body>
    <div class="box">
        <div class="logo"><img src="/static/logo.png" alt="Kaego"></div>
        <h2>Reset Sandi</h2>
        <p>Masukkan sandi baru kamu.</p>

        <label>Sandi Baru</label>
        <div class="password-wrapper">
            <input type="password" id="sandi" placeholder="Minimal 6 karakter">
            <button class="toggle-pw" data-target="sandi" tabindex="-1">
                <svg class="icon-tutup" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
                <svg class="icon-buka" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
            </button>
        </div>

        <label>Konfirmasi Sandi</label>
        <div class="password-wrapper">
            <input type="password" id="sandi2" placeholder="Ulangi sandi baru">
            <button class="toggle-pw" data-target="sandi2" tabindex="-1">
                <svg class="icon-tutup" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21"/>
                </svg>
                <svg class="icon-buka" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2" style="display:none;">
                    <path stroke-linecap="round" stroke-linejoin="round" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"/>
                    <path stroke-linecap="round" stroke-linejoin="round" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"/>
                </svg>
            </button>
        </div>

        <button class="btn-simpan" onclick="reset()">Simpan Sandi Baru</button>
        <div class="pesan" id="pesan"></div>
    </div>
    <script>
        // Toggle mata untuk setiap input password
        document.querySelectorAll(".toggle-pw").forEach(function(btn) {
            btn.addEventListener("click", function() {
                var input = document.getElementById(btn.getAttribute("data-target"));
                var iconTutup = btn.querySelector(".icon-tutup");
                var iconBuka = btn.querySelector(".icon-buka");
                if (input.type === "password") {
                    input.type = "text";
                    iconTutup.style.display = "none";
                    iconBuka.style.display = "block";
                } else {
                    input.type = "password";
                    iconTutup.style.display = "block";
                    iconBuka.style.display = "none";
                }
            });
        });

        var token = "{{ token }}";
        function reset() {
            var sandi = document.getElementById("sandi").value;
            var sandi2 = document.getElementById("sandi2").value;
            if (sandi.length < 6) { tampilPesan("Sandi minimal 6 karakter!", "error"); return; }
            if (sandi !== sandi2) { tampilPesan("Sandi tidak cocok!", "error"); return; }
            fetch("/reset-sandi/" + token, {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({password: sandi})
            })
            .then(function(r) { return r.json(); })
            .then(function(data) {
                if (data.success) {
                    tampilPesan("Sandi berhasil diubah! Silakan login.", "sukses");
                    setTimeout(function() { window.location.href = "/login"; }, 2000);
                } else {
                    tampilPesan(data.message || "Link tidak valid", "error");
                }
            });
        }
        function tampilPesan(msg, tipe) {
            var el = document.getElementById("pesan");
            el.textContent = msg;
            el.className = "pesan " + tipe;
            el.style.display = "block";
        }
    </script>
</body>
</html>
