<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Daftar - Kaego AI</title>
    <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f0f0f; min-height: 100vh; display: flex; justify-content: center; align-items: center; color: #e0e0e0; }
    .card { background: #1a1a1a; border: 1px solid #2a2a2a; border-radius: 16px; padding: 40px; width: 100%; max-width: 400px; }
    .logo { text-align: center; margin-bottom: 24px; }
    .logo img { height: 60px; width: auto; }
    h2 { text-align: center; font-size: 22px; margin-bottom: 24px; color: #fff; }
    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: 13px; color: #888; margin-bottom: 6px; }
    input { width: 100%; padding: 10px 14px; background: #2a2a2a; border: 1px solid #333; border-radius: 10px; color: #e0e0e0; font-size: 14px; outline: none; }
    input:focus { border-color: #1a6bff; }
    button { width: 100%; padding: 12px; background: #1a6bff; color: white; border: none; border-radius: 10px; font-size: 15px; cursor: pointer; margin-top: 8px; }
    button:hover { background: #0055dd; }
    .link { text-align: center; margin-top: 16px; font-size: 13px; color: #888; }
    .link a { color: #1a6bff; text-decoration: none; }
    .error { color: #ff4444; font-size: 13px; text-align: center; margin-top: 8px; display: none; }
    .success { color: #44ff88; font-size: 13px; text-align: center; margin-top: 8px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <div class="logo">
            <img src="/static/logo.png" alt="Kaego">
        </div>
        <h2>Daftar Akun Kaego</h2>
        <div class="form-group">
            <label>Nama</label>
            <input type="text" id="nama" placeholder="Nama kamu">
        </div>
        <div class="form-group">
            <label>Email</label>
            <input type="email" id="email" placeholder="email@kamu.com">
        </div>
        <div class="form-group">
            <label>Password</label>
            <input type="password" id="password" placeholder="••••••••">
        </div>
        <button id="btnDaftar">Daftar</button>
        <div class="error" id="error"></div>
        <div class="success" id="success"></div>
        <div class="link">Sudah punya akun? <a href="/login">Masuk di sini</a></div>
    </div>

    <script>
        document.getElementById("btnDaftar").addEventListener("click", function() {
            var nama = document.getElementById("nama").value;
            var email = document.getElementById("email").value;
            var password = document.getElementById("password").value;
            if (!nama || !email || !password) {
                document.getElementById("error").style.display = "block";
                document.getElementById("error").textContent = "Semua kolom harus diisi!";
                return;
            }
            fetch("/daftar", {
                method: "POST",
                headers: {"Content-Type": "application/json"},
                body: JSON.stringify({nama: nama, email: email, password: password})
            })
            .then(function(res) { return res.json(); })
            .then(function(data) {
                if (data.success) {
                    document.getElementById("success").style.display = "block";
                    document.getElementById("success").textContent = "Berhasil daftar! Silakan login.";
                    setTimeout(function() { window.location.href = "/login"; }, 2000);
                } else {
                    document.getElementById("error").style.display = "block";
                    document.getElementById("error").textContent = data.message;
                }
            });
        });
    </script>
</body>
</html>
